<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEXUS - Ace's Alt Toolkit</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #e0e0ff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Cutscene Overlay */
    #cutscene {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: opacity 1.5s ease-out;
      pointer-events: none;
    }
    #cutscene.hidden { opacity: 0; pointer-events: none; }
    #introText {
      font-family: 'Orbitron', sans-serif;
      font-size: 8rem;
      font-weight: 900;
      color: #00ffea;
      text-shadow: 0 0 40px #00ffea, 0 0 80px #00aaff;
      opacity: 0;
      transform: scale(0.8);
      animation: nexusReveal 3s forwards 0.5s;
    }
    @keyframes nexusReveal {
      0%   { opacity: 0; transform: scale(0.8); text-shadow: 0 0 0 #00ffea; }
      40%  { opacity: 1; transform: scale(1.05); text-shadow: 0 0 60px #00ffea; }
      70%  { transform: scale(0.98); }
      100% { opacity: 1; transform: scale(1); text-shadow: 0 0 30px #00ffea; }
    }

    header {
      text-align: center;
      padding: 30px 20px;
      background: rgba(0,0,0,0.5);
    }
    h1 { font-family: 'Orbitron', sans-serif; color: #00ffea; font-size: 3.5rem; margin-bottom: 10px; }
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 24px;
    }
    .card {
      background: rgba(20,20,50,0.8);
      border: 1px solid #4444aa;
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(10px);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover { transform: translateY(-8px); box-shadow: 0 12px 30px rgba(0,255,234,0.2); }
    h2 { color: #a78bfa; margin-bottom: 16px; font-size: 1.8rem; }
    input, select, button, textarea {
      padding: 12px 16px;
      border: 1px solid #5555aa;
      border-radius: 8px;
      background: rgba(255,255,255,0.07);
      color: white;
      font-size: 1.05rem;
    }
    button {
      background: #6a5acd;
      border: none;
      cursor: pointer;
      transition: all 0.25s;
    }
    button:hover { background: #7b68ee; transform: scale(1.05); }
    .avatar-preview {
      margin-top: 16px;
      text-align: center;
    }
    .avatar-preview img {
      max-width: 100%;
      border-radius: 12px;
      border: 3px solid #00ffea;
      box-shadow: 0 0 20px rgba(0,255,234,0.4);
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s ease-out;
    }
    .avatar-preview img.loaded { opacity: 1; transform: translateY(0); }
    .warning { color: #ffaa00; font-weight: bold; margin: 12px 0; }
    .result { font-weight: bold; margin-top: 12px; min-height: 1.5em; }
    footer { text-align: center; padding: 40px 20px; color: #aaa; font-size: 0.95rem; }
  </style>
</head>
<body>

  <!-- Smooth Cutscene Intro -->
  <div id="cutscene">
    <div id="introText">NEXUS</div>
  </div>

  <header>
    <h1>NEXUS</h1>
    <p>Ace's Advanced Alt Toolkit • 100% Client-Side • Columbus, OH 2026</p>
  </header>

  <main>

    <!-- Roblox Avatar Preview -->
    <section class="card">
      <h2>Roblox Avatar Preview</h2>
      <p class="warning">Enter username to see 420x420 full-body thumbnail (public only).</p>
      <div style="display:flex; gap:12px; flex-wrap:wrap;">
        <input type="text" id="avatarUser" placeholder="Username (e.g. Kwfobb)" style="flex:1;">
        <button onclick="loadAvatarPreview()">Load Preview</button>
      </div>
      <div class="avatar-preview" id="avatarContainer">
        <p id="avatarStatus" class="result">Enter a username above</p>
        <img id="avatarImg" alt="Roblox Avatar Preview" style="display:none;">
      </div>
    </section>

    <!-- Existing sections (shortened for brevity; add your full previous tools here) -->
    <section class="card">
      <h2>Username Ideas</h2>
      <!-- Your generateUsernames() UI here -->
    </section>

    <!-- Add your other cards: checker, password, styler, planner, webhook etc. -->

  </main>

  <footer>
    <p>Everything stays in-browser • Use responsibly • Built for fun</p>
  </footer>

  <script>
    // Cutscene: Fade out after animation
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('cutscene').classList.add('hidden');
      }, 4500); // 4.5s total (0.5s delay + 3s anim + buffer)
    });

    // Roblox Avatar Preview
    async function loadAvatarPreview() {
      const username = document.getElementById('avatarUser').value.trim();
      const status = document.getElementById('avatarStatus');
      const img = document.getElementById('avatarImg');
      const container = document.getElementById('avatarContainer');

      if (!username) {
        status.textContent = "Enter a username!";
        status.style.color = "orange";
        return;
      }

      status.textContent = "Resolving username...";
      status.style.color = "white";
      img.style.display = "none";

      try {
        // Step 1: Username → UserID (via users API)
        const userRes = await fetch(`https://users.roblox.com/v1/usernames/users`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usernames: [username], excludeBannedUsers: true })
        });
        const userData = await userRes.json();

        if (!userData.data?.length) throw new Error("User not found");

        const userId = userData.data[0].id;

        // Step 2: Get thumbnail
        const thumbUrl = `https://thumbnails.roblox.com/v1/users/avatar?userIds=${userId}&size=420x420&format=Png&isCircular=false`;
        const thumbRes = await fetch(thumbUrl);
        const thumbData = await thumbRes.json();

        if (thumbData.data?.[0]?.state !== "Completed" || !thumbData.data?.[0]?.imageUrl) {
          throw new Error("Thumbnail not ready or unavailable");
        }

        img.src = thumbData.data[0].imageUrl;
        img.onload = () => {
          img.classList.add('loaded');
          img.style.display = "block";
        };
        status.textContent = `Preview for ${username} (ID: ${userId})`;
        status.style.color = "#55ff55";
      } catch (err) {
        status.textContent = "Error: " + err.message + " (try again or check username)";
        status.style.color = "#ff5555";
      }
    }

    // Add your other functions here (generateUsernames, checkRobloxUsername, etc.)
  </script>
</body>
</html>
